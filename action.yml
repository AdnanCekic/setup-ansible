name: Setup Ansible
description: Install Ansible in an isolated virtualenv (supports GitHub-hosted and self-hosted runners)
inputs:
  version:
    required: true
    description: Ansible Core version to install (e.g. "2.20.1")
  python-version:
    required: false
    default: "3.12"
    description: Python version to use (e.g. "3.11", "3.12")

runs:
  using: composite
  steps:
    - name: Check for pre-installed Python
      id: check-python
      shell: bash
      run: |
        if python3 --version &>/dev/null; then
          echo "found=true" >> $GITHUB_OUTPUT
          echo "Python already available: $(python3 --version)"
        else
          echo "found=false" >> $GITHUB_OUTPUT
        fi

    - name: Setup Python (GitHub-hosted runners)
      if: steps.check-python.outputs.found == 'false'
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Ensure pip and venv are available
      shell: bash
      run: |
        if ! python3 -m pip --version &>/dev/null; then
          echo "pip not found — trying ensurepip"
          if python3 -m ensurepip --default-pip 2>/dev/null; then
            echo "pip installed via ensurepip"
          else
            echo "ensurepip failed — installing from system packages"
            SUDO=""
            if [ "$(id -u)" -ne 0 ] && command -v sudo &>/dev/null; then
              SUDO="sudo"
            fi
            if command -v apt-get &>/dev/null; then
              $SUDO apt-get update -qq
              $SUDO apt-get install -y -qq python3-pip python3-venv
            elif command -v dnf &>/dev/null; then
              $SUDO dnf install -y -q python3-pip
            elif command -v yum &>/dev/null; then
              $SUDO yum install -y -q python3-pip
            elif command -v apk &>/dev/null; then
              $SUDO apk add --quiet py3-pip
            else
              echo "::error::No supported package manager found. Install Python 3 manually."
              exit 1
            fi
          fi
        fi
        echo "Python version: $(python3 --version)"

    - name: Restore venv cache
      uses: actions/cache@v5
      with:
        path: .venv
        key: ansible-${{ runner.os }}-${{ inputs.version }}

    - name: Create virtualenv
      shell: bash
      run: |
        if [ ! -d ".venv" ]; then
          python3 -m venv .venv
        fi

    - name: Install ansible-core if needed
      shell: bash
      run: |
        source .venv/bin/activate

        if ansible-playbook --version 2>/dev/null | grep -q "core ${{ inputs.version }}"; then
          echo "Ansible Core ${{ inputs.version }} already installed, skipping."
        else
          echo "Installing Ansible Core ${{ inputs.version }}"
          python -m pip install --upgrade pip
          python -m pip install ansible-core==${{ inputs.version }}
        fi

    - name: Verify Ansible
      shell: bash
      run: |
        source .venv/bin/activate
        ansible-playbook --version

    - name: Add venv to PATH
      shell: bash
      run: |
        echo "$(pwd)/.venv/bin" >> $GITHUB_PATH
