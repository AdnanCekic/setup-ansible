name: Setup Ansible
description: Install Ansible in an isolated virtualenv (supports GitHub-hosted and self-hosted runners)
inputs:
  version:
    required: true
    description: Ansible Core version to install (e.g. "2.20.1")
  python-version:
    required: false
    default: "3.12"
    description: Python version to use (e.g. "3.11", "3.12")

runs:
  using: composite
  steps:
    - name: Check for pre-installed Python
      id: check-python
      shell: bash
      run: |
        if python3 --version &>/dev/null; then
          echo "found=true" >> $GITHUB_OUTPUT
          echo "Python already available: $(python3 --version)"
        else
          echo "found=false" >> $GITHUB_OUTPUT
        fi

    - name: Setup Python (GitHub-hosted runners)
      if: steps.check-python.outputs.found == 'false'
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Ensure pip and venv are available
      id: python-info
      shell: bash
      run: |
        if ! python3 -m pip --version &>/dev/null; then
          echo "pip not found — trying ensurepip"
          if python3 -m ensurepip --default-pip 2>/dev/null; then
            echo "pip installed via ensurepip"
          else
            echo "ensurepip unavailable — installing pip via get-pip.py (no sudo needed)"
            curl -sSL https://bootstrap.pypa.io/get-pip.py -o /tmp/get-pip.py
            python3 /tmp/get-pip.py --user --quiet --break-system-packages
            export PATH="$HOME/.local/bin:$PATH"
            echo "$HOME/.local/bin" >> $GITHUB_PATH
          fi
        fi
        PYVER=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}.{sys.version_info.micro}')")
        echo "Python version: $PYVER"
        echo "python-version=$PYVER" >> $GITHUB_OUTPUT

    - name: Restore venv cache
      uses: actions/cache@v5
      with:
        path: .venv
        key: ansible-${{ runner.os }}-py${{ steps.python-info.outputs.python-version }}-${{ inputs.version }}

    - name: Create virtualenv
      shell: bash
      run: |
        # Validate cached venv works with current Python
        if [ -d ".venv" ] && ! .venv/bin/python3 --version &>/dev/null; then
          echo "Cached venv is stale (Python mismatch) — recreating"
          rm -rf .venv
        fi
        if [ ! -d ".venv" ]; then
          if ! python3 -m venv .venv 2>/dev/null; then
            echo "venv module failed — creating virtualenv manually"
            python3 -m venv --without-pip .venv
            curl -sSL https://bootstrap.pypa.io/get-pip.py | .venv/bin/python3
          fi
        fi

    - name: Install ansible-core if needed
      shell: bash
      run: |
        source .venv/bin/activate

        if ansible-playbook --version 2>/dev/null | grep -q "core ${{ inputs.version }}"; then
          echo "Ansible Core ${{ inputs.version }} already installed, skipping."
        else
          echo "Installing Ansible Core ${{ inputs.version }}"
          python -m pip install --upgrade pip
          python -m pip install ansible-core==${{ inputs.version }}
        fi

    - name: Verify Ansible
      shell: bash
      run: |
        source .venv/bin/activate
        ansible-playbook --version

    - name: Add venv to PATH
      shell: bash
      run: |
        echo "$(pwd)/.venv/bin" >> $GITHUB_PATH
