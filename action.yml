name: Setup Ansible
description: Install Ansible in an isolated virtualenv (supports GitHub-hosted and self-hosted runners)
inputs:
  version:
    required: true
    description: Ansible Core version to install (e.g. "2.20.1")
  python-version:
    required: false
    default: "3.12"
    description: Python version to use (e.g. "3.11", "3.12")

runs:
  using: composite
  steps:
    - name: Setup Python
      id: setup-python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
      continue-on-error: true

    - name: Install Python from system package manager (self-hosted fallback)
      if: steps.setup-python.outcome == 'failure'
      shell: bash
      run: |
        echo "actions/setup-python failed — installing Python from system packages"
        # Use sudo only if not running as root
        SUDO=""
        if [ "$(id -u)" -ne 0 ] && command -v sudo &>/dev/null; then
          SUDO="sudo"
        fi
        if command -v apt-get &>/dev/null; then
          $SUDO apt-get update -qq
          $SUDO apt-get install -y -qq python3 python3-pip python3-venv
        elif command -v dnf &>/dev/null; then
          $SUDO dnf install -y -q python3 python3-pip
        elif command -v yum &>/dev/null; then
          $SUDO yum install -y -q python3 python3-pip
        elif command -v apk &>/dev/null; then
          $SUDO apk add --quiet python3 py3-pip
        else
          echo "::error::No supported package manager found. Install Python 3 manually."
          exit 1
        fi
        echo "Python version: $(python3 --version)"

    - name: Restore venv cache
      uses: actions/cache@v4
      with:
        path: .venv
        key: ansible-${{ runner.os }}-${{ inputs.version }}

    - name: Create virtualenv
      shell: bash
      run: |
        if [ ! -d ".venv" ]; then
          python3 -m venv .venv
        fi

    - name: Install ansible-core if needed
      shell: bash
      run: |
        source .venv/bin/activate

        if ansible-playbook --version 2>/dev/null | grep -q "core ${{ inputs.version }}"; then
          echo "Ansible Core ${{ inputs.version }} already installed, skipping."
        else
          echo "Installing Ansible Core ${{ inputs.version }}"
          python -m pip install --upgrade pip
          python -m pip install ansible-core==${{ inputs.version }}
        fi

    - name: Verify Ansible
      shell: bash
      run: |
        source .venv/bin/activate
        ansible-playbook --version

    - name: Add venv to PATH
      shell: bash
      run: |
        echo "$(pwd)/.venv/bin" >> $GITHUB_PATH
